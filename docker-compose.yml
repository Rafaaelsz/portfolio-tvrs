services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-tvrs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio_tvrs
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "54329:5432"
    volumes:
      - portfolio-tvrs-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_tvrs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  portfolio-tvrs-postgres:
